<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />
    <!-- link with tailwind + Daisy -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font family -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Outfit:wght@100..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet" />
    <!-- font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer" />

    <style>
      * {
        font-family: "Outfit", sans-serif;
      }
    </style>
    <title>Payoo | Home</title>
  </head>
  <body class="min-h-screen max-w-md bg-base-200 mx-auto ">
    <header class="border-b-1 bg-gray-100 sticky top-0 z-10 bg-base-200">
      <section class="w-11/12 mx-auto py-3 flex justify-between items-center">
        <div class="left flex gap-2">
          <div class="logo w-[60px]">
            <img src="./assets/logo.png" alt="" />
          </div>
          <div class="balance-info">
            <h2 class="text-2xl font-bold">
              $ <span id="balance">45000</span>
            </h2>
            <p class="text-neutral/50">Available Balance</p>
          </div>
        </div>
        <div class="right">
          <a href="./index.html" class="btn btn-soft text-neutral/50 rounded-lg"
            ><i class="fa-solid fa-arrow-right-from-bracket"></i>Log Out</a
          >
        </div>
      </section>
    </header>
    <section class="w-11/12 mx-auto py-10 space-y-5">
      <h2 class="text-3xl font-bold">
        Welcome to pay<span class="text-primary">oo</span>
      </h2>
      <p class="text-neutral/50">
        Enjoy easy and convenient financial services with us. Cashout charge is
        low and
      </p>

      <div class="buttons grid grid-cols-3 gap-3">
        <div class="btn flex flex-col h-full py-4 btn-soft">
          <img src="./assets/opt-1.png" alt="" />
          <p>Add Money</p>
        </div>
        <div class="btn flex flex-col h-full py-4 btn-soft">
          <img src="./assets/opt-2.png" alt="" />
          <p>Cashout</p>
        </div>
        <div class="btn flex flex-col h-full py-4 btn-soft">
          <img src="./assets/opt-3.png" alt="" />
          <p>Send Money</p>
        </div>
        <div class="btn flex flex-col h-full py-4 btn-soft">
          <img src="./assets/opt-4.png" alt="" />
          <p>Get Bonus</p>
        </div>
        <div class="btn flex flex-col h-full py-4 btn-soft">
          <img src="./assets/opt-5.png" alt="" />
          <p>Pay Bill</p>
        </div>
        <div class="btn flex flex-col h-full py-4 btn-soft">
          <img src="./assets/opt-6.png" alt="" />
          <p>Transactions</p>
        </div>
      </div>
    </section>

    <section class="w-11/12 mx-auto pb-40">
      <h1 class="font-bold text-xl">Cash Out</h1>
      <div class="cash-out pt-4">
        <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow mx-auto">
          <div class="card-body ">
            <fieldset class="fieldset ">
              <label class="label text-neutral font-bold">Agent Number</label>
              <input
                id="cashout-number"
                maxlength="11"
                minlength="11"
                type="text" value="01234567890"
                class="input rounded-full bg-base-200 w-full"
                placeholder="Enter Agent 11 Digit Number" />

                <br>
              <label class="label text-neutral font-bold">Amount</label>
              <input
                id="cashout-amount"
                type="number"
                class="input w-full rounded-full bg-base-200"
                placeholder="Enter Widrow Amount" />
                <br>
              <label class="label text-neutral font-bold">Pin Number</label>
              <input
                id="cashout-pin"
                maxlength="4"
                type="password"
                class="input w-full rounded-full bg-base-200"
                placeholder="Enter 4 Digit Pin" />

              <button id="btn-cashout" class="btn btn-primary mt-4 rounded-full">
                Withdraw Money
              </button>
            </fieldset>
          </div>
        </div>
      </div>
    </section>

    <script src="./script/cashout.js"></script>
  </body>
</html>
